
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading… | System Design</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../stylesheets/common.css">
    <link rel="stylesheet" href="../stylesheets/article.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container-xl px-4">
            <a class="navbar-brand fw-bold text-white" href="../index.html">🚀 <span>Ashutosh</span> | System Design</a>
        </div>
    </nav>

    <!-- Header — filled by JS -->
    <div class="article-header" id="articleHeader" style="display:none;">
        <div class="container-xl px-4">
            <nav aria-label="breadcrumb" class="mb-3">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a href="../index.html" class="text-secondary text-decoration-none">Home</a></li>
                    <li class="breadcrumb-item active text-white" id="breadcrumbDay"></li>
                </ol>
            </nav>
            <div class="d-flex gap-2 mb-3 flex-wrap">
                <span class="day-badge" id="dayBadge"></span>
                <span class="topic-tag" id="topicTag"></span>
                <span class="topic-tag" id="readTime"></span>
            </div>
            <h1 class="fw-bold mb-2" style="font-size:clamp(1.5rem,4vw,2.2rem);" id="articleTitle"></h1>
            <p class="mb-0" style="color:#94a3b8;" id="articleSubtitle"></p>
        </div>
    </div>

    <!-- Body — filled by JS -->
    <div class="container-xl px-4 py-5" id="articleBody" style="display:none;">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-8">
                <div class="article-body p-4 p-md-5" id="articleContent"></div>
                <div class="d-flex justify-content-between align-items-center mt-4 flex-wrap gap-3" id="articleNav"></div>
            </div>
        </div>
    </div>

    <!-- Not found -->
    <div class="container-xl px-4 py-5 text-center" id="notFound" style="display:none;">
        <div style="font-size:3rem;">🤔</div>
        <h4 class="fw-bold mt-3" style="color:#1e293b;">Article not found</h4>
        <p class="text-muted">This day doesn't exist yet. Check back soon!</p>
        <a href="../index.html" class="btn btn-primary fw-semibold">← Back to Home</a>
    </div>

    <footer class="py-4 text-center mt-4">
        Built with ❤️ by <a href="../index.html">Ashutosh Pandey</a>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="articles.js"></script>
    <script>
        function renderBlocks(blocks) {
            return blocks.map(block => {
                switch (block.type) {
                    case 'text':
                        return `<p>${block.value}</p>`;
                    case 'heading':
                        return `<h5 class="fw-bold mt-4 mb-3" style="color:#1e293b;">${block.value}</h5>`;
                    case 'flow':
                        return `<div class="highlight-box my-4">${block.value}</div>`;
                    case 'list':
                        return `<ul>${block.value.map(i => `<li>${i}</li>`).join('')}</ul>`;
                    case 'checklist':
                        return `<ul class="check-list">${block.value.map(i => `<li>✅ ${i}</li>`).join('')}</ul>`;
                    case 'cards':
                        return `<div class="row g-3 my-4">${block.value.map(c =>
                            `<div class="col-12 col-sm-6"><div class="scale-card h-100"><h6>${c.title}</h6><p class="mb-0 small">${c.text}</p></div></div>`
                        ).join('')}</div>`;
                    case 'takeaway':
                        return `<h5 class="fw-bold mt-4 mb-3" style="color:#1e293b;">💡 Key Takeaway</h5><p>${block.value}</p>`;
                    default:
                        return '';
                }
            }).join('');
        }

        const params = new URLSearchParams(window.location.search);
        const dayNum = parseInt(params.get('day'), 10);
        const article = ARTICLES.find(a => a.day === dayNum);

        if (!article) {
            document.getElementById('notFound').style.display = '';
        } else {
            document.title = `Day ${article.day}: ${article.title} | System Design`;

            document.getElementById('breadcrumbDay').textContent = `Day ${article.day}`;
            document.getElementById('dayBadge').textContent = `Day ${article.day}`;
            document.getElementById('topicTag').textContent = article.tag;
            document.getElementById('readTime').textContent = `⏱ ${article.readTime} read`;
            document.getElementById('articleTitle').textContent = article.title;
            document.getElementById('articleSubtitle').textContent = article.subtitle;
            document.getElementById('articleContent').innerHTML = renderBlocks(article.content);

            const prev = ARTICLES.find(a => a.day === dayNum - 1);
            const next = ARTICLES.find(a => a.day === dayNum + 1);
            const nav = document.getElementById('articleNav');

            nav.innerHTML = prev
                ? `<a href="article.html?day=${prev.day}" class="back-btn"><i class="bi bi-arrow-left me-1"></i>Day ${prev.day}: ${prev.title}</a>`
                : `<a href="../index.html" class="back-btn"><i class="bi bi-arrow-left me-1"></i>Back to Home</a>`;

            nav.innerHTML += next
                ? `<a href="article.html?day=${next.day}" class="btn btn-primary fw-semibold">Day ${next.day}: ${next.title} →</a>`
                : `<a href="../index.html" class="btn btn-primary fw-semibold"><i class="bi bi-house me-1"></i>Back to Home</a>`;

            document.getElementById('articleHeader').style.display = '';
            document.getElementById('articleBody').style.display = '';
        }
    </script>
</body>
</html>
